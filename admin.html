.ct{flex:1;overflow-y:auto;padding:20px}

function renderStatsEdit(stats){

  </div>`).join('');
}
function handlePhoto(inp){
  const file=inp.files[0];if(!file)return;
  if(file.size>2097152){notif('Image too large. Max 2MB.','e');return}
  const reader=new FileReader();reader.onload=e=>{const D=gD();D.profilePhoto=e.target.result;sD(D);const wrap=document.getElementById('photoWrap');if(wrap)wrap.innerHTML=`<img src="${e.target.result}" id="photoImg"><div class="img-ov">&#128247;</div>`;notif('Photo updated!','s')};reader.readAsDataURL(file);
}
function clearPhoto(){const D=gD();D.profilePhoto='';sD(D);showView('personal')}
function addTag(v){v=v.trim();if(!v)return;const D=gD();if(!D.tags.includes(v)){D.tags.push(v);sD(D)}const wrap=document.getElementById('tagWrap');const inp=document.getElementById('tagInp');if(wrap&&inp){const sp=document.createElement('span');sp.className='pill';sp.innerHTML=`${h(v)}<span class="pill-x" onclick="rmTag('${h(v)}')">x</span>`;wrap.insertBefore(sp,inp)}}
function rmTag(v){const D=gD();D.tags=D.tags.filter(t=>t!==v);sD(D);showView('personal')}
function addStat(){const D=gD();D.stats=D.stats||[];D.stats.push({n:'',l:''});sD(D);const se=document.getElementById('statsEdit');if(se)se.innerHTML=renderStatsEdit(D.stats)}
function rmStat(i){const D=gD();D.stats.splice(i,1);sD(D);const se=document.getElementById('statsEdit');if(se)se.innerHTML=renderStatsEdit(D.stats)}
function sPersonal(D){
  const n=document.getElementById('pName')?.value,t=document.getElementById('pTitle')?.value;
  if(n)D.name=n;if(t)D.title=t;
  ['pLoc','pEmail','pPhone','pLI','pGH','pRG','pCV','pAbout','pObj'].forEach(id=>{
    const v=document.getElementById(id)?.value;
    const map={pLoc:'location',pEmail:'email',pPhone:'phone',pLI:'linkedin',pGH:'github',pRG:'researchgate',pCV:'cvUrl',pAbout:'about',pObj:'objective'};
    if(v!==undefined)D[map[id]]=v;
  });
  const photoUrl=document.getElementById('photoUrl')?.value?.trim();
  if(photoUrl)D.profilePhoto=photoUrl;
  const stats=[];const se=document.getElementById('statsEdit');
  if(se){const cnt=se.querySelectorAll('[id^=stn]').length;for(let i=0;i<cnt;i++){const n2=document.getElementById('stn'+i)?.value,l=document.getElementById('stl'+i)?.value;if(n2||l)stats.push({n:n2||'',l:l||''})}}
  if(stats.length)D.stats=stats;
  sD(D);
}

    <div style="display:flex;gap:8px"><button class="btn btn-sm bp" onclick="saveAward(${i})">Save</button><button class="btn btn-sm bd" onclick="delAward(${i})">Delete</button></div>
  </div>`).join('');
}
function saveAward(i){const D=gD();const a=D.awards[i]||{};a.title=document.getElementById('at-'+i)?.value||a.title;a.link=document.getElementById('al-'+i)?.value||'';D.awards[i]=a;sD(D);notif('Award saved!','s')}
function addAward(){const D=gD();D.awards.push({title:'New Award',link:''});sD(D);showView('awards')}
function delAward(i){if(!confirm('Delete?'))return;const D=gD();D.awards.splice(i,1);sD(D);showView('awards')}
function sAwards(D){sD(D)}

// ========== RESUME UPLOAD & AI PARSE ==========
function vUpload(el){
  el.innerHTML=`
  <div class="al ai">Upload your latest resume (PDF or TXT). The AI will extract all sections and update your portfolio profile automatically. Requires a free Groq API key.</div>
  <div class="card">
    <div class="ctit">Step 1: Groq API Key (free)</div>
    <div class="fg"><label>Groq API Key (get free at console.groq.com, sign in with Google)</label>
      <input type="password" id="groqKey" placeholder="gsk_..." value="${h(localStorage.getItem('pfv3_groq')||'')}">
    </div>
    <button class="btn bp" onclick="saveGroqKey()">Save Key</button>
    <div style="font-size:12px;color:var(--t2);margin-top:8px">Key stored locally in your browser. Never sent to any server.</div>
  </div>
  <div class="card">
    <div class="ctit">Step 2: Upload Resume</div>
    <div class="fg"><label>Select PDF or TXT file</label><input type="file" id="resumeFile" accept=".pdf,.txt" style="padding:6px"></div>
    <div id="uploadStatus"></div>
    <button class="btn bp" onclick="parseResume()" id="parseBtn">Parse &amp; Update Profile</button>
  </div>
  <div class="card">
    <div class="ctit">Step 3: Review &amp; Save</div>
    <div style="font-size:13px;color:var(--t2);line-height:1.8">After parsing, review each section in the admin panel and click "Save Changes" to confirm. The AI extraction is a starting point &mdash; always verify the data.</div>
    <div style="margin-top:12px;display:flex;gap:10px">
      <button class="btn bs" onclick="showView('personal')">Review Personal Info</button>
      <button class="btn bs" onclick="showView('experience')">Review Experience</button>
      <button class="btn bs" onclick="showView('skills')">Review Skills</button>
    </div>
  </div>`;
}
function saveGroqKey(){const k=document.getElementById('groqKey')?.value?.trim();if(k){localStorage.setItem('pfv3_groq',k);notif('API key saved!','s')}else{localStorage.removeItem('pfv3_groq');notif('Key cleared.','i')}}
async function parseResume(){
  const file=document.getElementById('resumeFile')?.files[0];
  if(!file){notif('Please select a file.','e');return}
  const key=localStorage.getItem('pfv3_groq');
  if(!key){notif('Add a Groq API key first.','e');return}
  const status=document.getElementById('uploadStatus');
  status.innerHTML='<div class="al ai" style="display:flex;gap:8px;align-items:center"><div class="spin"></div>Reading file...</div>';
  const btn=document.getElementById('parseBtn');if(btn)btn.disabled=true;
  try{
    const text=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{let c=e.target.result;if(typeof c!=='string'){const b=new Uint8Array(c);const a=[];for(let i=0;i<b.length;i++){const ch=b[i];if((ch>=32&&ch<127)||ch===10||ch===13)a.push(String.fromCharCode(ch))}c=a.join('').replace(/\s{3,}/g,'\n')}res(c.slice(0,7000))};r.onerror=rej;file.type==='text/plain'?r.readAsText(file):r.readAsArrayBuffer(file)});
    status.innerHTML='<div class="al ai">AI parsing resume (this takes 10-20 seconds)...</div>';
    const prompt=`Extract ALL professional information from this resume. Return ONLY valid JSON, no markdown, no explanation:\n{"name":"","title":"","email":"","phone":"","location":"","summary":"","objective":"","experience":[{"role":"","company":"","location":"","period":"","current":false,"desc":""}],"education":[{"degree":"","school":"","location":"","date":"","gpa":""}],"skills":{"GIS Tools":[{"n":"","l":80,"c":"#00d4a0"}],"Programming":[{"n":"","l":80,"c":"#4f9cf9"}],"Remote Sensing":[{"n":"","l":80,"c":"#f59e0b"}],"Data & Analytics":[{"n":"","l":75,"c":"#a78bfa"}]},"certifications":[{"name":"","issuer":"","date":"","icon":"?","bg":"rgba(0,212,160,0.1)"}],"publications":[{"title":"","venue":"","desc":"","link":""}],"awards":[{"title":"","link":""}]}\n\nRESUME TEXT:\n${text}`;
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'llama-3.1-70b-versatile',messages:[{role:'user',content:prompt}],temperature:0.3,max_tokens:6000})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||'Groq error '+r.status)}
    const d=await r.json();
    const raw=d?.choices?.[0]?.message?.content||'';
    const cl=raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    const m=cl.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('Could not find JSON in AI response');
    const parsed=JSON.parse(m[0]);
    const D=gD();
    if(parsed.name)D.name=parsed.name;if(parsed.title)D.title=parsed.title;if(parsed.email)D.email=parsed.email;if(parsed.phone)D.phone=parsed.phone;if(parsed.location)D.location=parsed.location;if(parsed.summary)D.about=parsed.summary;if(parsed.objective)D.objective=parsed.objective;
    if(parsed.experience?.length>0)D.experience=parsed.experience;
    if(parsed.education?.length>0)D.education=parsed.education;
    if(parsed.skills){Object.keys(parsed.skills).forEach(k=>{if(parsed.skills[k]?.length>0)D.skills[k]=parsed.skills[k]})}
    if(parsed.certifications?.length>0&&parsed.certifications[0].name)D.certifications=parsed.certifications;
    if(parsed.publications?.length>0&&parsed.publications[0].title)D.publications=parsed.publications;
    if(parsed.awards?.length>0&&parsed.awards[0].title)D.awards=parsed.awards;
    sD(D);
    status.innerHTML='<div class="al as">Profile updated from resume! Review each section in the admin and save. Click "View Portfolio" to see the result.</div>';
    if(btn)btn.disabled=false;
  }catch(e){status.innerHTML=`<div class="al ae">Error: ${h(e.message)}</div>`;if(btn)btn.disabled=false;}
}

// ========== EXPORT ==========
function vExport(el){
  el.innerHTML=`
  <div class="card">
    <div class="ctit">Backup Your Data</div>
    <div style="font-size:13px;color:var(--t2);margin-bottom:14px">Export all your portfolio content as a JSON file. Useful for backup or moving to another browser/device.</div>
    <button class="btn bp" onclick="exportData()">Export JSON Backup</button>
  </div>
  <div class="card">
    <div class="ctit">Restore Data</div>
    <div class="fg"><input type="file" accept=".json" onchange="importData(event)" style="padding:6px"></div>
    <div style="font-size:12px;color:var(--t2)">Select a previously exported JSON backup file to restore all portfolio data.</div>
  </div>
  <div class="card">
    <div class="ctit">Publish to GitHub Pages</div>
    <div style="font-size:13px;color:var(--t2);line-height:1.9;margin-bottom:14px">
      1. Make all edits here in the admin panel<br>
      2. Click "Export JSON Backup" above<br>
      3. Both <code>index.html</code> and <code>admin.html</code> files need to be uploaded to your GitHub repository<br>
      4. The data lives in your browser localStorage &mdash; on each device, import your JSON backup<br>
      5. For a fully static approach, edit the DEFAULT data directly in <code>index.html</code>
    </div>
    <a href="https://github.com/redwan95/kabirportfolio" target="_blank" class="btn bs">Open GitHub Repo &rarr;</a>
  </div>
  <div class="card">
    <div class="ctit">Reset to Defaults</div>
    <div style="font-size:13px;color:var(--t2);margin-bottom:14px">Reset all portfolio content back to the original default data. This cannot be undone.</div>
    <button class="btn bd" onclick="resetData()">Reset to Default Data</button>
  </div>`;
}
function exportData(){const D=gD();const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(D,null,2)],{type:'application/json'}));a.download='portfolio_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click()}
function importData(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);sD(d);notif('Data restored! Reload to see changes.','s');showView('personal')}catch(err){notif('Invalid backup file.','e')}};r.readAsText(f)}
function resetData(){if(!confirm('Reset ALL portfolio data to defaults? This cannot be undone.'))return;sD(JSON.parse(JSON.stringify(DEF)));notif('Data reset to defaults.','s');showView('personal')}

document.querySelectorAll('.ni[data-view]').forEach(el=>el.addEventListener('click',()=>showView(el.dataset.view)));
showView('personal');
